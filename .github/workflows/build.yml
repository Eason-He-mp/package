name: Build Windows EXE (Win7 compatible)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: windows-2019     # 较老的 Windows Server 环境，兼容性更好

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 3.8 (32-bit)
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          architecture: 'x86'            # 32 位，同时兼容 32/64 位 Win7

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 CT 扫描主程序
        run: |
          pyinstaller --onefile --windowed --name CT_Scan_Tool 2D_scan.py

      - name: 打包坐标抓取器
        run: |
          pyinstaller --onefile --windowed --name GetCoords get_coords.py

      - name: 上传所有 EXE
        uses: actions/upload-artifact@v6
        with:
          name: CT_Tools_Win7
          path: |
            dist/CT_Scan_Tool.exe
            dist/GetCoords.exe
