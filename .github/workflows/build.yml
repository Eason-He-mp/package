name: Build Windows EXE

on:
  workflow_dispatch:            # 也可以在网页上手动点按钮打包

jobs:
  build:
    runs-on: windows-2025-vs2026     # 使用 GitHub 的 Windows 虚拟机

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包CT扫描程序
        run: |
          pyinstaller --onefile --windowed --name CT_Scan_Tool 2D_scan.py
          
      - name: 打包坐标抓取器
        run: pyinstaller --onefile --windowed --name GetCoords get_coords.py

      - name: 上传所有 EXE
        uses: actions/upload-artifact@v6
        with:
          name: CT_Tools_Package
          path: |
            dist/CT_Scan_Tool.exe
            dist/GetCoords.exe
          
      
